{% extends 'base.html' %}
{% block title %}Password Changed{% endblock %}
{% block nav_profile %}active{% endblock %}
{% block page_title %}Password Changed{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="page-card">
            <div class="page-card-body text-center">
                <div style="font-size:3.5rem;margin-bottom:1rem;">🔒</div>
                <h5 style="font-family:'Playfair Display',serif;color:var(--navy);margin-bottom:0.5rem;">
                    Password Updated!
                </h5>
                <p style="color:var(--muted);font-size:0.875rem;margin-bottom:2rem;">
                    Your password has been changed successfully.
                </p>
                <a href="{% url 'dashboard' %}" class="btn-teal">
                    <i class="bi bi-grid"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
